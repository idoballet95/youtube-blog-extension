name: soccerblog_youtube_auto
description: "유튜브 영상 자막을 추출하고 병렬 처리(delegate)로 네이버 블로그에 임시저장하는 파이프라인"

instructions: |
  ## 필수 사전 준비
  작업 시작 전 반드시 두 파일을 모두 읽어라:
  - /Users/irenedo/Desktop/naver-blog-automation/projects/youtube/socceryoutube-policy.md
  - /Users/irenedo/Desktop/naver-blog-automation/projects/youtube/socceryoutube-writing.md

  ---

  ## STEP 1. 유튜브 영상 자막 수집 및 병렬 에이전트 소환 (Delegate)
  입력받은 `youtube_urls` (쉼표로 구분) 각각의 URL에 대해 동시에 작업을 수행할 병렬 서브 에이전트를 소환합니다.

  루트 에이전트(Main Agent)는 `delegate` 도구를 `async: true`로 설정하여 서브 에이전트들을 동시에 실행하고, 작업이 끝날 때까지 대기(poll)합니다. (각 에이전트에게 필요한 확장 도구를 모두 활성화할 수 있도록 합니다. 예: youtubetranscript, developer 등)

  각 서브 에이전트에게 할당할 Task Instructions (지시사항):
  1. 할당받은 유튜브 URL의 자막을 `youtubetranscript` 확장 도구(`get_transcript` 또는 `get_timed_transcript`)를 사용하여 추출한다. (lang="ko" 우선, 없으면 "en")
  2. 추출된 자막 내용을 바탕으로 `socceryoutube-policy.md` 및 `socceryoutube-writing.md`의 블로그 작성 규칙에 따라 1,700자 분량의 블로그 초안을 작성한다.
  3. 작성된 초안 데이터를 바탕으로 노션 DB(`notion_db`)에 항목을 저장한다. (Status=Done)
  4. 네이버 임시저장 스크립트(naver-draft.js)를 사용하여 블로그를 임시저장한다.

  ## STEP 2. 서브 에이전트의 네이버 임시저장 가이드
  서브 에이전트가 네이버 임시저장을 할 때는 다음 명령어로 `naver-draft.js`를 사용하도록 안내하세요.
  ```bash
  node /Users/irenedo/Desktop/naver-blog-automation/naver-draft.js --stdin << 'NAVER_EOF'
  {
    "title": "최종 유튜브 분석 제목",
    "source_url": "해당 유튜브 영상 URL",
    "title_suggestions": {"search1":"검색형1","search2":"검색형2","feed1":"홈판형1","feed2":"홈판형2"},
    "intro": "서론 텍스트 (\\n\\n으로 문단 구분)",
    "toc": ["소제목1","소제목2","소제목3","소제목4"],
    "sections": [
      {"heading":"소제목1","content":"내용 텍스트","images":[]},
      {"heading":"소제목2","content":"내용 텍스트","images":[]},
      {"heading":"소제목3","content":"내용 텍스트","images":[]},
      {"heading":"소제목4","content":"내용 텍스트","images":[]}
    ],
    "closing": "마무리 멘트 / 독자 질문",
    "hashtags": "#해시태그1 #해시태그2 #해시태그3",
    "recent_posts": []
  }
  NAVER_EOF
  ```

  ## STEP 3. 텔레그램 알림 (서브 에이전트 완료 후 루트 에이전트가 1회 전송)
  모든 서브 에이전트의 작업이 성공적으로 완료되면 아래 명령어로 텔레그램 알림을 발송합니다.
  ```bash
  TODAY=$(date +%Y-%m-%d)
  curl -s -X POST "https://api.telegram.org/bot8701089270:AAHI93gEaFNjUK3k2BnDg0AwU_RNCsAFSbY/sendMessage" \
    -H "Content-Type: application/json" \
    -d "{\"chat_id\":\"8647560570\",\"text\":\"✅ 유튜브 축구 블로그 (병렬 테스트) 완료!\\n\\n📅 날짜: ${TODAY}\\n📝 유튜브 자막 기반 임시저장 완료\"}"
  ```

parameters:
  - key: policy_guide
    description: 역할·사실 정확성·콘텐츠 수집 규칙 파일 경로
    default: "/Users/irenedo/Desktop/naver-blog-automation/projects/youtube/socceryoutube-policy.md"
    input_type: string
    requirement: optional
  - key: writing_guide
    description: 글쓰기·포맷·제목·해시태그 규칙 파일 경로
    default: "/Users/irenedo/Desktop/naver-blog-automation/projects/youtube/socceryoutube-writing.md"
    input_type: string
    requirement: optional
  - key: notion_db
    description: 노션 블로그 1차 DB ID
    default: "32be48c4-a6a2-800c-8075-f49d28e89c28"
    input_type: string
    requirement: optional
  - key: youtube_urls
    description: "분석할 유튜브 영상 URL 목록 (쉼표로 구분, 테스트용으로 1~2개 입력)"
    default: "https://www.youtube.com/watch?v=dQw4w9WgXcQ"
    input_type: string
    requirement: required
